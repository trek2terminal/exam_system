{% extends "base.html" %}

{% block title %}Student Login - Exam System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-wrapper">
        <div class="auth-card auth-login-card">
            <div class="auth-header">
                <div class="auth-icon student-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1>Student Login</h1>
                <p>Enter your details to join an exam session</p>
            </div>

            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="student_name">
                        <i class="fas fa-user"></i> Full Name
                    </label>
                    <input
                        type="text"
                        id="student_name"
                        name="student_name"
                        placeholder="Enter your full name"
                        required
                        class="form-input"
                    >
                </div>

                <div class="form-group">
                    <label for="roll_no">
                        <i class="fas fa-id-card"></i> Roll Number
                    </label>
                    <input
                        type="text"
                        id="roll_no"
                        name="roll_no"
                        placeholder="Enter your roll number"
                        required
                        class="form-input"
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-arrow-right"></i> Continue to Join Exam
                </button>
            </form>

            <div class="auth-footer">
                <a href="{{ url_for('auth.login_selector') }}" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Login Selector
                </a>
            </div>
        </div>
    </div>
</div>

<style>
.auth-icon.student-icon {
    background: rgba(233, 30, 99, 0.15);
    color: #e91e63;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(79, 140, 255, 0.3);
}
</style>
{% endblock %}
