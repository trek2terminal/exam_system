{% extends "base.html" %}

{% block title %}Admin Login - Exam System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-wrapper">
        <div class="auth-card auth-login-card">
            <div class="auth-header">
                <div class="auth-icon admin-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <h1>Administrator Login</h1>
                <p>Access control panel with full system privileges</p>
            </div>

            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter your username"
                        required
                        autocomplete="username"
                        class="form-input"
                    >
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                        class="form-input"
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="auth-footer">
                <a href="{{ url_for('auth.login_selector') }}" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Login Selector
                </a>
            </div>
        </div>
    </div>
</div>

<style>
.auth-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: radial-gradient(circle at top left, rgba(255, 193, 7, 0.15), transparent 40%),
                radial-gradient(circle at bottom right, rgba(79, 140, 255, 0.1), transparent 40%),
                var(--bg);
}

.auth-wrapper {
    width: 100%;
    max-width: 400px;
}

.auth-card {
    background: var(--panel-solid);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 3rem 2rem;
    animation: slideUp 0.5s ease;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}

.auth-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 1rem;
    background: rgba(79, 140, 255, 0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: var(--primary);
}

.auth-icon.admin-icon {
    background: rgba(255, 193, 7, 0.15);
    color: #ffc107;
}

.auth-header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--text);
}

.auth-header p {
    color: var(--muted);
    font-size: 0.95rem;
}

.auth-form {
    margin-bottom: 2rem;
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text);
    font-weight: 500;
    font-size: 0.95rem;
}

.form-group label i {
    margin-right: 0.5rem;
    color: var(--primary);
}

.form-input {
    width: 100%;
    padding: 0.75rem 1rem;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text);
    font-size: 1rem;
    transition: all 0.3s ease;
}

.form-input:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(79, 140, 255, 0.1);
    box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.1);
}

.form-input::placeholder {
    color: var(--muted);
}

.btn {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: var(--radius-md);
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(79, 140, 255, 0.3);
}

.btn-primary:active {
    transform: translateY(0);
}

.btn-block {
    width: 100%;
}

.btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.auth-footer {
    text-align: center;
    border-top: 1px solid var(--border);
    padding-top: 1.5rem;
}

.back-link {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    transition: all 0.3s ease;
}

.back-link:hover {
    gap: 0.75rem;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

body.light-mode .auth-container {
    background: radial-gradient(circle at top left, rgba(255, 193, 7, 0.08), transparent 40%),
                radial-gradient(circle at bottom right, rgba(79, 140, 255, 0.06), transparent 40%),
                var(--light-bg);
}

body.light-mode .auth-card {
    background: var(--light-panel-solid);
    border-color: var(--light-border);
}

body.light-mode .auth-header h1 {
    color: var(--light-text);
}

body.light-mode .form-group label {
    color: var(--light-text);
}

body.light-mode .form-input {
    background: rgba(0, 0, 0, 0.03);
    border-color: var(--light-border);
    color: var(--light-text);
}

body.light-mode .form-input:focus {
    background: rgba(79, 140, 255, 0.08);
}
</style>
{% endblock %}
