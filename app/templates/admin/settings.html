{% extends "base.html" %}

{% block title %}Settings - Admin{% endblock %}

{% block content %}
<div class="admin-page">
    <div class="page-header">
        <h1><i class="fas fa-cog"></i> System Settings</h1>
        <p>Configure system-wide exam and user settings</p>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Exam Configuration</h2>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('admin.save_settings') }}" class="settings-form">
                <div class="form-group">
                    <label>Max Exam Duration (minutes)</label>
                    <input type="number" name="max_duration" value="180" min="1" max="600">
                </div>
                <div class="form-group">
                    <label>Allow Exam Rescheduling</label>
                    <input type="checkbox" name="allow_reschedule" checked>
                </div>
                <div class="form-group">
                    <label>Auto-lock Exams After Time</label>
                    <input type="checkbox" name="auto_lock" checked>
                </div>
                <button type="submit" class="btn btn-primary">Save Settings</button>
            </form>
        </div>
    </div>
</div>

<style>
.admin-page {
    padding: 2rem;
    max-width: 800px;
    margin: 0 auto;
}

.page-header h1 {
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
}

.card {
    background: var(--panel-solid);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-top: 2rem;
    overflow: hidden;
}

.card-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
}

.card-body {
    padding: 2rem;
}

.settings-form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.form-group label {
    font-weight: 500;
    color: var(--text);
}

.form-group input[type="number"],
.form-group input[type="checkbox"] {
    padding: 0.5rem;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text);
}

.btn {
    padding: 0.75rem 1.5rem;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(79, 140, 255, 0.3);
}
</style>
{% endblock %}
