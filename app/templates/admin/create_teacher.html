{% extends "base.html" %}

{% block title %}Create Teacher - Admin{% endblock %}

{% block content %}
<div class="admin-page">
    <div class="page-header">
        <div>
            <h1><i class="fas fa-user-plus"></i> Create Teacher Account</h1>
            <p>Add a new teacher to the system</p>
        </div>
    </div>

    <div class="form-card">
        <form method="POST" class="admin-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Full Name *</label>
                    <input type="text" id="name" name="name" required placeholder="Enter teacher's full name">
                </div>
                <div class="form-group">
                    <label for="username"><i class="fas fa-at"></i> Username *</label>
                    <input type="text" id="username" name="username" required placeholder="Unique username">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" name="email" placeholder="teacher@example.com">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password *</label>
                    <input type="password" id="password" name="password" required placeholder="Strong password (min. 8 chars)">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="department"><i class="fas fa-building"></i> Department</label>
                    <input type="text" id="department" name="department" placeholder="e.g., Computer Science">
                </div>
                <div class="form-group">
                    <label for="designation"><i class="fas fa-briefcase"></i> Designation</label>
                    <input type="text" id="designation" name="designation" placeholder="e.g., Assistant Professor">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-check"></i> Create Teacher Account
                </button>
                <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<style>
.admin-page {
    padding: 2rem;
    max-width: 800px;
    margin: 0 auto;
}

.page-header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
}

.page-header p {
    color: var(--muted);
}

.form-card {
    background: var(--panel-solid);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem;
    margin-top: 2rem;
}

.admin-form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1rem;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.form-group label {
    font-weight: 500;
    color: var(--text);
    font-size: 0.9rem;
}

.form-group label i {
    margin-right: 0.5rem;
    color: var(--primary);
}

.form-group input {
    padding: 0.75rem 1rem;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text);
    font-size: 1rem;
    transition: all 0.3s ease;
}

.form-group input:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(79, 140, 255, 0.1);
}

.form-actions {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
}

.btn {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: var(--radius-md);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(79, 140, 255, 0.3);
}

.btn-secondary {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
}

.btn-secondary:hover {
    border-color: var(--primary);
    background: rgba(79, 140, 255, 0.05);
}
</style>
{% endblock %}
