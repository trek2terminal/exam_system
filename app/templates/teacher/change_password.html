{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Set Your Password</h1>
        <p>Replace the temporary password before entering the teacher dashboard.</p>
      </div>

      <form method="post" class="student-roster-form">
        <label for="current_password">Current Password</label>
        <input id="current_password" type="password" name="current_password" autocomplete="current-password" required>

        <label for="new_password">New Password</label>
        <input id="new_password" type="password" name="new_password" autocomplete="new-password" required>

        <label for="confirm_password">Confirm New Password</label>
        <input id="confirm_password" type="password" name="confirm_password" autocomplete="new-password" required>

        <button class="btn primary" type="submit">
          <i class="fas fa-key"></i> Update Password
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
