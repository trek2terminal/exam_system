{% extends "base.html" %}
{% block title %}Teacher Proctoring{% endblock %}

{% block content %}
<div class="admin-page proctor-page">
  <div class="page-header">
    <div>
      <h1><i class="fas fa-display"></i> My Live Proctoring</h1>
      <p>Read-only monitoring for exams you created.</p>
    </div>
    <button class="btn primary" type="button" onclick="refreshTeacherProctoring()">Refresh</button>
  </div>

  <div class="stats proctor-stats">
    <div class="stat-box"><div class="stat-label">Active</div><div class="stat-value" id="activeCount">0</div></div>
    <div class="stat-box"><div class="stat-label">Waiting</div><div class="stat-value" id="waitingCount">0</div></div>
    <div class="stat-box"><div class="stat-label">Paused</div><div class="stat-value" id="pausedCount">0</div></div>
    <div class="stat-box"><div class="stat-label">Flagged</div><div class="stat-value" id="flaggedCount">0</div></div>
  </div>

  <div id="teacherProctorGrid" class="proctor-grid"></div>
</div>

<script>
function formatSeconds(seconds) {
  seconds = Math.max(0, parseInt(seconds || 0, 10));
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function badgeClass(status) {
  return ['active', 'waiting', 'paused', 'terminated', 'submitted'].includes(status) ? status : 'secondary';
}

function createMetric(label, value) {
  const item = document.createElement('div');
  const labelNode = document.createElement('span');
  labelNode.textContent = label;
  const valueNode = document.createElement('strong');
  valueNode.textContent = String(value);
  item.append(labelNode, valueNode);
  return item;
}

function renderTeacherSessions(sessions) {
  const grid = document.getElementById('teacherProctorGrid');
  grid.replaceChildren();
  if (!sessions.length) {
    const emptyCard = document.createElement('div');
    emptyCard.className = 'card';
    const emptyText = document.createElement('p');
    emptyText.className = 'muted';
    emptyText.textContent = 'No active or waiting students right now.';
    emptyCard.appendChild(emptyText);
    grid.appendChild(emptyCard);
    return;
  }
  sessions.forEach(session => {
    const card = document.createElement('article');
    card.className = `proctor-card ${session.focus_violations >= 3 ? 'danger' : session.focus_violations ? 'flagged' : ''}`;
    const header = document.createElement('div');
    header.className = 'row-between';
    const headingWrap = document.createElement('div');
    const title = document.createElement('h3');
    title.textContent = `${session.student_name || '-'} (${session.roll_no || '-'})`;
    const subtitle = document.createElement('p');
    subtitle.className = 'muted';
    subtitle.textContent = `${session.exam_name || '-'} | Set ${session.set_code || '-'}`;
    headingWrap.append(title, subtitle);
    const status = document.createElement('span');
    status.className = `badge ${badgeClass(session.status)}`;
    status.textContent = session.status || '-';
    header.append(headingWrap, status);

    const metrics = document.createElement('div');
    metrics.className = 'proctor-metrics';
    metrics.append(
      createMetric('Time', formatSeconds(session.remaining_seconds)),
      createMetric('Answers', `${session.answered_count || 0}/${session.total_questions || 0}`),
      createMetric('Violations', session.focus_violations || 0),
      createMetric('Latest', session.latest_violation || '-')
    );

    const note = document.createElement('p');
    note.className = 'muted';
    note.textContent = 'Teacher view is read-only. Admin handles termination, second chance, and timer adjustments.';
    card.append(header, metrics, note);
    grid.appendChild(card);
  });
}

async function refreshTeacherProctoring() {
  const response = await fetch('{{ url_for("teacher.proctoring_status") }}');
  const data = await response.json();
  if (!data.ok) return;
  document.getElementById('activeCount').textContent = data.counts.active_sessions;
  document.getElementById('waitingCount').textContent = data.counts.waiting_sessions;
  document.getElementById('pausedCount').textContent = data.counts.paused_sessions;
  document.getElementById('flaggedCount').textContent = data.counts.flagged_sessions;
  renderTeacherSessions(data.sessions);
  window.ExamRealtime?.joinProctorExams(
    [...new Set((data.sessions || []).map(item => item.exam_id).filter(Boolean))],
    'refreshTeacherProctoring'
  );
}

document.addEventListener('DOMContentLoaded', () => {
  refreshTeacherProctoring();
  setInterval(refreshTeacherProctoring, 5000);
});
</script>
{% endblock %}
