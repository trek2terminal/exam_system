<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Join Exam</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { min-height:100vh; display:flex;
           align-items:center; justify-content:center;
           background:#0E1117; font-family:'Segoe UI',sans-serif; }
    .card {
      background:#161B27; border:1px solid #252D45;
      border-radius:14px; padding:40px 36px; width:360px;
    }
    .logo { font-size:2.2rem; text-align:center; margin-bottom:8px; }
    h1 { text-align:center; color:#E2E8F4;
         font-size:1.3rem; margin-bottom:4px; }
    .sub { text-align:center; color:#566380;
           font-size:0.85rem; margin-bottom:28px; }
    label { display:block; font-size:0.75rem; font-weight:700;
            color:#566380; text-transform:uppercase;
            letter-spacing:0.08em; margin-bottom:6px; }
    input { width:100%; padding:10px 14px;
            background:#0E1117; border:1px solid #252D45;
            border-radius:8px; color:#E2E8F4;
            font-size:0.95rem; margin-bottom:18px; outline:none; }
    input:focus { border-color:#4F8EF7; }
    .error { background:#2A1515; color:#E05C5C;
             border:1px solid #E05C5C; border-radius:8px;
             padding:10px 14px; font-size:0.85rem; margin-bottom:16px; }
    button { width:100%; padding:12px;
             background:#3DD68C; color:#0E1117;
             border:none; border-radius:8px;
             font-size:1rem; font-weight:700; cursor:pointer; }
    button:hover { background:#2ec97e; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🐍</div>
  <h1>Python Exam</h1>
  <p class="sub">Enter your details to begin</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <label>Your Full Name</label>
    <input type="text" name="name"
           autocomplete="off" required placeholder="e.g. Rahul Sharma">

    <label>Seat Number</label>
    <input type="number" name="seat"
           min="1" max="10" required placeholder="Ask your teacher">

    <button type="submit">Start Exam →</button>
  </form>
</div>
</body>
</html>
