<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Exam</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0E1117; color:#E2E8F4;
           font-family:'Segoe UI',sans-serif;
           height:100vh; display:flex; flex-direction:column;
           overflow:hidden; }

    /* Header */
    header {
      background:#0A0D14; border-bottom:1px solid #252D45;
      padding:10px 20px; display:flex;
      align-items:center; justify-content:space-between;
      flex-shrink:0;
    }
    .header-left { font-size:0.95rem; font-weight:700; }
    .header-left span { color:#566380; font-weight:400;
                        font-size:0.82rem; margin-left:10px; }
    .timer {
      font-family:Consolas,monospace; font-size:1.1rem;
      font-weight:700; color:#3DD68C; background:#163A26;
      padding:5px 16px; border-radius:8px;
    }
    .timer.warn  { color:#F5A623; background:#2A1F00; }
    .timer.danger{ color:#E05C5C; background:#2A1515; }

    /* Body */
    .body { display:flex; flex:1; overflow:hidden; }

    /* Question panel */
    .q-panel {
      width:340px; background:#161B27;
      border-right:1px solid #252D45;
      display:flex; flex-direction:column;
      flex-shrink:0;
    }
    .q-label {
      padding:14px 16px 6px;
      font-size:0.72rem; font-weight:700;
      color:#566380; text-transform:uppercase; letter-spacing:0.08em;
    }
    .q-number {
      padding:0 16px 10px;
      font-size:1.5rem; font-weight:700; color:#4F8EF7;
    }
    .q-text {
      flex:1; padding:0 16px 16px;
      font-size:0.95rem; line-height:1.7;
      color:#E2E8F4; overflow-y:auto;
      user-select:none; -webkit-user-select:none;
    }
    .nav-row {
      display:flex; gap:8px; padding:12px 16px;
      border-top:1px solid #252D45;
    }
    .nav-btn {
      flex:1; padding:9px; border:none; border-radius:8px;
      font-weight:700; font-size:0.85rem; cursor:pointer;
      background:#1C2136; color:#4F8EF7;
    }
    .nav-btn:disabled { opacity:0.3; cursor:not-allowed; }
    .nav-btn:not(:disabled):hover { background:#252D45; }

    /* Editor panel */
    .editor-panel {
      flex:1; display:flex; flex-direction:column; overflow:hidden;
    }
    .editor-toolbar {
      background:#161B27; border-bottom:1px solid #252D45;
      padding:8px 14px; display:flex;
      align-items:center; justify-content:space-between;
      flex-shrink:0;
    }
    .file-name { font-family:Consolas,monospace;
                 font-size:0.85rem; color:#4F8EF7; }
    .toolbar-btns { display:flex; gap:8px; }
    .run-btn {
      padding:7px 18px; background:#163A26; color:#3DD68C;
      border:none; border-radius:7px; font-weight:700;
      font-size:0.88rem; cursor:pointer;
    }
    .run-btn:hover { background:#1a4a30; }
    .run-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .clear-btn {
      padding:7px 14px; background:#2A1515; color:#E05C5C;
      border:none; border-radius:7px; font-weight:700;
      font-size:0.88rem; cursor:pointer;
    }
    .submit-btn {
      padding:7px 18px; background:#1E2D50; color:#4F8EF7;
      border:1px solid #4F8EF7; border-radius:7px;
      font-weight:700; font-size:0.88rem; cursor:pointer;
    }
    .submit-btn:hover { background:#252D45; }

    #code-editor {
      flex:1; background:#1C2136; color:#CDD6F4;
      font-family:Consolas,monospace; font-size:13px;
      line-height:1.6; padding:14px; border:none;
      outline:none; resize:none; tab-size:4;
      caret-color:#4F8EF7;
    }
    #code-editor::selection { background:#233060; }

    /* Output panel */
    .output-panel {
      height:190px; background:#090C12;
      border-top:1px solid #252D45;
      display:flex; flex-direction:column; flex-shrink:0;
    }
    .output-header {
      padding:6px 14px; background:#0A0D14;
      border-bottom:1px solid #252D45;
      display:flex; align-items:center;
      justify-content:space-between; flex-shrink:0;
    }
    .output-label {
      font-size:0.72rem; font-weight:700;
      color:#566380; text-transform:uppercase; letter-spacing:0.08em;
    }
    #status-text { font-size:0.78rem; }
    #output-text {
      flex:1; overflow-y:auto; padding:10px 14px;
      font-family:Consolas,monospace; font-size:12px;
      line-height:1.6; white-space:pre-wrap; color:#CDD6F4;
    }
    #output-text::-webkit-scrollbar { width:4px; }
    #output-text::-webkit-scrollbar-thumb {
      background:#252D45; border-radius:2px; }

    /* Input row */
    .input-row {
      display:none; background:#090C12;
      border-top:1px solid #252D45;
      padding:6px 10px; align-items:center; gap:8px;
    }
    .input-row.show { display:flex; }
    .input-prompt { color:#F5A623; font-family:Consolas,monospace;
                    font-size:13px; font-weight:700; }
    #stdin-field {
      flex:1; background:#0F1520; border:1px solid #F5A623;
      border-radius:6px; padding:6px 10px;
      font-family:Consolas,monospace; font-size:13px;
      color:#F5A623; outline:none;
    }
    .stdin-submit {
      padding:6px 14px; background:#241800; color:#F5A623;
      border:1px solid #F5A623; border-radius:6px;
      font-weight:700; cursor:pointer; font-size:0.85rem;
    }

    /* Prevent text selection on question */
    .q-text { pointer-events:none; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    🐍 {{ student.name }}
    <span>Set {{ set_name }} · Q{{ question_number }}/{{ total_questions }}</span>
  </div>
  <div class="timer" id="timer">--:--</div>
</header>

<div class="body">

  <!-- Question Panel -->
  <div class="q-panel">
    <div class="q-label">Question</div>
    <div class="q-number" id="q-number">{{ question_number }}</div>
    <div class="q-text" id="q-text"
         oncontextmenu="return false"
         oncopy="return false"
         onselectstart="return false">
      {{ question_text }}
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="prev-btn"
              {% if question_number <= 1 or not free_navigation %}disabled{% endif %}
              onclick="navigate(-1)">◀ Prev</button>
      <button class="nav-btn" id="next-btn"
              {% if question_number >= total_questions %}disabled{% endif %}
              onclick="navigate(1)">Next ▶</button>
    </div>
  </div>

  <!-- Editor Panel -->
  <div class="editor-panel">
    <div class="editor-toolbar">
      <span class="file-name">solution.py</span>
      <div class="toolbar-btns">
        <button class="clear-btn" onclick="clearEditor()">✕ Clear</button>
        <button class="run-btn" id="run-btn" onclick="runCode()">▶ Run</button>
        <button class="submit-btn" onclick="submitExam()">Submit Exam ✔</button>
      </div>
    </div>

    <textarea id="code-editor"
      spellcheck="false"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
    >{{ saved_code }}</textarea>

    <!-- Output -->
    <div class="output-panel">
      <div class="output-header">
        <span class="output-label">Output / Errors</span>
        <span id="status-text" style="color:#566380;">Ready</span>
      </div>
      <div id="output-text"
           style="color:#566380;font-style:italic;">
// Press ▶ Run to execute your code...
      </div>
      <div class="input-row" id="input-row">
        <span class="input-prompt">›</span>
        <input type="text" id="stdin-field"
               placeholder="Type your input here and press Enter..."
               autocomplete="off">
        <button class="stdin-submit" onclick="submitStdin()">Submit ↵</button>
      </div>
    </div>

  </div>
</div>

<script>
  // ── State ──────────────────────────────────────
  let currentQuestion = {{ question_number }};
  const totalQuestions = {{ total_questions }};
  const freeNavigation = {{ 'true' if free_navigation else 'false' }};
  let remainingSeconds = {{ remaining_seconds }};
  let autoSaveTimer = null;

  // ── Timer ──────────────────────────────────────
  function updateTimer() {
    if (remainingSeconds <= 0) {
      document.getElementById('timer').textContent = '00:00';
      document.getElementById('timer').className = 'timer danger';
      autoSubmit();
      return;
    }
    const m = Math.floor(remainingSeconds / 60).toString().padStart(2,'0');
    const s = (remainingSeconds % 60).toString().padStart(2,'0');
    const el = document.getElementById('timer');
    el.textContent = `${m}:${s}`;
    if (remainingSeconds <= 60)       el.className = 'timer danger';
    else if (remainingSeconds <= 300) el.className = 'timer warn';
    else                              el.className = 'timer';
    remainingSeconds--;
    setTimeout(updateTimer, 1000);
  }
  updateTimer();

  // ── Auto-save every 15 seconds ─────────────────
  function autoSave() {
    const code = document.getElementById('code-editor').value;
    fetch('/student/api/save', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ question: currentQuestion, code: code })
    });
  }
  setInterval(autoSave, 15000);

  // ── Navigation ─────────────────────────────────
  function navigate(delta) {
    const code = document.getElementById('code-editor').value;
    const newQ = currentQuestion + delta;
    if (newQ < 1 || newQ > totalQuestions) return;

    fetch('/student/api/navigate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ new_question: newQ, current_code: code })
    })
    .then(r => r.json())
    .then(data => {
      if (!data.ok) return;
      currentQuestion = data.question_number;
      document.getElementById('q-number').textContent = currentQuestion;
      document.getElementById('q-text').textContent   = data.question_text;
      document.getElementById('code-editor').value    = data.saved_code || '';
      document.getElementById('output-text').textContent =
        '// Press ▶ Run to execute your code...';
      document.getElementById('output-text').style.color = '#566380';
      document.getElementById('output-text').style.fontStyle = 'italic';
      document.getElementById('status-text').textContent = 'Ready';
      document.getElementById('input-row').classList.remove('show');

      // Update nav buttons
      document.getElementById('prev-btn').disabled =
        (currentQuestion <= 1 || !freeNavigation);
      document.getElementById('next-btn').disabled =
        (currentQuestion >= totalQuestions);

      // Update header
      document.querySelector('.header-left span').textContent =
        `Set {{ set_name }} · Q${currentQuestion}/${totalQuestions}`;
    });
  }

  // ── Run code ───────────────────────────────────
  let pendingInput = false;

  function runCode() {
    const code = document.getElementById('code-editor').value.trim();
    if (!code) return;

    document.getElementById('run-btn').disabled = true;
    document.getElementById('status-text').textContent = '⏳ Running…';
    document.getElementById('status-text').style.color = '#F5A623';
    document.getElementById('output-text').textContent = '';
    document.getElementById('output-text').style.color = '#CDD6F4';
    document.getElementById('output-text').style.fontStyle = 'normal';
    document.getElementById('input-row').classList.remove('show');

    // Check if code uses input()
    if (code.includes('input(')) {
      pendingInput = true;
      appendOutput('// Your code uses input().\n// Enter your input below and press Submit ↵\n', '#F5A623');
      document.getElementById('input-row').classList.add('show');
      document.getElementById('stdin-field').focus();
      document.getElementById('run-btn').disabled = false;
      document.getElementById('status-text').textContent = 'Waiting for input…';
      return;
    }

    executeCode('');
  }

  function submitStdin() {
    const stdin = document.getElementById('stdin-field').value;
    document.getElementById('stdin-field').value = '';
    document.getElementById('input-row').classList.remove('show');
    pendingInput = false;
    appendOutput('> ' + stdin + '\n', '#F5A623');
    executeCode(stdin);
  }

  document.getElementById('stdin-field').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); submitStdin(); }
  });

  function executeCode(stdin) {
    const code = document.getElementById('code-editor').value;
    fetch('/student/api/run', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ code: code, stdin: stdin })
    })
    .then(r => r.json())
    .then(data => {
      document.getElementById('run-btn').disabled = false;
      if (!data.ok && !data.output) {
        appendOutput(data.error || 'Unknown error.', '#E05C5C');
        document.getElementById('status-text').textContent = '✘ Error';
        document.getElementById('status-text').style.color = '#E05C5C';
        return;
      }
      if (data.output) appendOutput(data.output, '#CDD6F4');
      if (data.error)  appendOutput(data.error,  '#E05C5C');
      if (data.code === 0) {
        document.getElementById('status-text').textContent = '✔ Done';
        document.getElementById('status-text').style.color = '#3DD68C';
      } else {
        document.getElementById('status-text').textContent = '✘ Error';
        document.getElementById('status-text').style.color = '#E05C5C';
      }
    })
    .catch(() => {
      document.getElementById('run-btn').disabled = false;
      appendOutput('Network error. Try again.', '#E05C5C');
    });
  }

  function appendOutput(text, color) {
    const el = document.getElementById('output-text');
    const span = document.createElement('span');
    span.style.color = color;
    span.textContent = text;
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
  }

  function clearEditor() {
    document.getElementById('code-editor').value = '';
  }

  // ── Tab key → 4 spaces ─────────────────────────
  document.getElementById('code-editor').addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const ta = e.target;
      const s  = ta.selectionStart;
      ta.value = ta.value.substring(0,s) + '    ' + ta.value.substring(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = s + 4;
    }
  });

  // ── Submit exam ────────────────────────────────
  function submitExam() {
    if (!confirm('Submit your exam? This cannot be undone.')) return;
    autoSave();
    const code = document.getElementById('code-editor').value;
    fetch('/student/api/submit', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ current_code: code })
    })
    .then(r => r.json())
    .then(data => {
      if (data.ok) window.location.href = '/student';
    });
  }

  function autoSubmit() {
    const code = document.getElementById('code-editor').value;
    fetch('/student/api/submit', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ current_code: code })
    }).then(() => window.location.href = '/student');
  }

  // ── Block DevTools shortcuts ───────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'F12') { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) {
      e.preventDefault(); return false;
    }
    if (e.ctrlKey && e.key.toUpperCase() === 'U') {
      e.preventDefault(); return false;
    }
  });
  document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
