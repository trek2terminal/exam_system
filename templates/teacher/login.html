<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0E1117;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background: #161B27;
      border: 1px solid #252D45;
      border-radius: 14px;
      padding: 40px 36px;
      width: 380px;
    }
    .logo { font-size: 2rem; text-align: center; margin-bottom: 8px; }
    h1 {
      text-align: center; color: #E2E8F4;
      font-size: 1.3rem; margin-bottom: 4px;
    }
    .sub {
      text-align: center; color: #566380;
      font-size: 0.85rem; margin-bottom: 28px;
    }
    label {
      display: block; color: #566380;
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 6px;
    }
    input {
      width: 100%; padding: 10px 14px;
      background: #0E1117; border: 1px solid #252D45;
      border-radius: 8px; color: #E2E8F4;
      font-size: 0.95rem; margin-bottom: 18px;
      outline: none;
    }
    input:focus { border-color: #4F8EF7; }
    .error {
      background: #2A1515; color: #E05C5C;
      border: 1px solid #E05C5C;
      border-radius: 8px; padding: 10px 14px;
      font-size: 0.85rem; margin-bottom: 16px;
    }
    button {
      width: 100%; padding: 12px;
      background: #4F8EF7; color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #3a7de0; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🐍</div>
  <h1>Python Exam System</h1>
  <p class="sub">Teacher / Admin Login</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" autocomplete="off" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <button type="submit">Login →</button>
  </form>
</div>
</body>
</html>
