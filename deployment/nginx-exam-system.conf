# Replace SERVER_IP_OR_DOMAIN and PROJECT_ROOT before enabling this server block.
# LAN example: server_name 192.168.1.105;
# Hosted example: server_name exam.example.com;

server {
    listen 80;
    server_name SERVER_IP_OR_DOMAIN;

    client_max_body_size 25m;

    location /static/ {
        alias PROJECT_ROOT/app/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:8000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
    }
}
